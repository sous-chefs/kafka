---
provisioner:
  name: chef_infra
  chef_license: accept
  deprecations_as_errors: true
  attributes:
    kafka_test:
      version: <%= ENV.fetch('KAFKA_VERSION', '4.2.0').inspect %>
      scala_version: <%= ENV.fetch('SCALA_VERSION', '2.13').inspect %>
      sha512_checksum: <%= ENV.fetch('KAFKA_SHA512', '16ce46e590ba915f01b720ea514445e49c88bf129cf4ceab88878b122d54ef24f0dedb88d0eb178957f58057a6c6a9adbea8b8059307585daea13129b85ba1d8').inspect %>

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-9
  - name: oraclelinux-10
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
